{% set name = "pytest-memray" %}
{% set version = "1.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pytest_memray-{{ version }}.tar.gz
  sha256: c0c706ef81941a7aa7064f2b3b8b5cdc0cea72b5277c6a6a09b113ca9ab30bdb

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling >=1.11.1
    - hatch-vcs >=0.2
    - pip
  run:
    - python >={{ python_min }}
    - pytest >=7.2
    - memray >=1.4.1

test:
  imports:
    - pytest_memray
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A simple plugin to use with pytest
  home: https://github.com/bloomberg/pytest-memray
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - cbourjau
